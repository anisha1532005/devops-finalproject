<!DOCTYPE html>
<html>
<head>
    <title>ShopZone</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        button {
            background: #27ae60;
            color: white;
            padding: 8px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>🛒 ShopZone</header>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
        <h3>Shoes</h3>
        <p>₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
        <h3>Watch</h3>
        <p>₹1499</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1519677100203-a0e668c92439">
        <h3>Headphones</h3>
        <p>₹1999</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
